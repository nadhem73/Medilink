version: '3.8'

services:
  prescription-db:
    image: postgres:15
    container_name: prescription-db
    environment:
      POSTGRES_DB: prescription_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - prescription_data:/var/lib/postgresql/data
    networks:
      - smarthealth-network

  prescription-service:
    build: .
    container_name: prescription-service
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://prescription-db:5432/prescription_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    depends_on:
      - prescription-db
    networks:
      - smarthealth-network

volumes:
  prescription_data:

networks:
  smarthealth-network:
    external: true
