server:
  port: 8081

spring:
  application:
    name: auth-service
  
  # Configuration PostgreSQL avec AUTO-CREATION
  datasource:
    url: jdbc:postgresql://localhost:5432/medilink_auth
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  # JPA Configuration - AUTO CREATE TABLES
  jpa:
    hibernate:
      ddl-auto: update  # Crée/Met à jour automatiquement les tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  
  # Mail Configuration (à configurer plus tard)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:medilink.tunisia@gmail.com}
    password: ${MAIL_PASSWORD:vbetczremlrszfsa}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  # Spring Cloud Config (Désactivé pour développement local)
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:medilinktunisia2025SecretKeyForJWTTokenGenerationAndValidation}
  expiration: 900000  # 15 minutes (en millisecondes)
  refresh-expiration: 604800000  # 7 jours (en millisecondes)

# Réinitialisation de mot de passe
app:
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}
  reset-token-expiration-minutes: 60

# Eureka Client - Service Discovery
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true  # Activé - Tous les services doivent s'inscrire sur Eureka
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Logging
logging:
  level:
    com.medilinktunisia: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/auth-service.log

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false  # Désactiver le health check email
