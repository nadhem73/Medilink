spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  datasource:
    initialization-mode: always
    
logging:
  level:
    com.medilinktunisia.pharmacyservice: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: INFO
  file:
    name: logs/pharmacy-service-dev.log

server:
  port: 8085
