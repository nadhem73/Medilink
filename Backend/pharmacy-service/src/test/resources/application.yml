spring:
  application:
    name: pharmacy-service-test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    open-in-view: false
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false
  sql:
    init:
      mode: never

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: test-secret-key-for-unit-testing-only-very-long-and-secure
  expiration: 3600000
