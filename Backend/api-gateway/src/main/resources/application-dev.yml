# Configuration pour l'environnement de développement
spring:
  cloud:
    gateway:
      httpclient:
        wiretap: true
      httpserver:
        wiretap: true

server:
  port: 8765

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Redis local
spring.data.redis:
  host: localhost
  port: 6379
  password: ""

# JWT Configuration pour dev
# Doit être identique à auth-service et patient-service pour valider les tokens
jwt:
  secret: medilinktunisia2025SecretKeyForJWTTokenGenerationAndValidation
  expiration: 86400000 # 24 heures

logging:
  level:
    root: INFO
    com.medilinktunisia: DEBUG
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
