server:
  port: 8088
  servlet:
    context-path: /api/teleconsultations

spring:
  application:
    name: teleconsultation-service
  
  profiles:
    active: ${ACTIVE_PROFILE:dev}
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medilink_teleconsultation}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
    enabled: true
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

# Management endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000

# WebRTC Configuration
webrtc:
  stun-servers:
    - stun:stun.l.google.com:19302
    - stun:stun1.l.google.com:19302
  turn-servers:
    - turn:turn.example.com:3478

# WebSocket Configuration
websocket:
  allowed-origins: ${WEBSOCKET_ORIGINS:http://localhost:3000,http://localhost:4200}

# File Upload Configuration
file:
  upload-dir: ${UPLOAD_DIR:./uploads/teleconsultation}

# Logging
logging:
  level:
    com.medilinktunisia.teleconsultationservice: DEBUG
    org.springframework.web: INFO
    org.springframework.security: DEBUG
    org.springframework.web.socket: DEBUG
    org.hibernate: INFO
  file:
    name: logs/teleconsultation-service.log
    max-size: 10MB
    max-history: 30
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
