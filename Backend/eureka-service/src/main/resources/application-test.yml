server:
  port: 8761

spring:
  application:
    name: eureka-service

eureka:
  instance:
    hostname: localhost
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false
    wait-time-in-ms-when-sync-empty: 0

logging:
  level:
    root: ERROR
    com.medilinktunisia: ERROR
