spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database-platform: org.hibernate.dialect.H2Dialect
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false
eureka:
  client:
    enabled: false
jwt:
  secret: test-secret-key-for-unit-testing-purposes-only
