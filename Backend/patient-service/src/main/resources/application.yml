server:
  port: 8082

spring:
  application:
    name: patient-service
  
  sql:
    init:
      mode: always
      schema-locations: classpath:db-init.sql
      continue-on-error: true
  
  # Configuration PostgreSQL avec AUTO-CREATION
  datasource:
    url: jdbc:postgresql://localhost:5432/medilink_patients
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-test-query: SELECT 1
      maximum-pool-size: 5
  
  # JPA Configuration - AUTO CREATE TABLES
  jpa:
    hibernate:
      ddl-auto: update  # Crée/Met à jour automatiquement les tables
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  
  # File Upload Configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  
  # Spring Cloud Config (Désactivé pour développement local)
  cloud:
    config:
      enabled: false
      import-check:
        enabled: false

# JWT Configuration (validation des tokens)
jwt:
  secret: ${JWT_SECRET:medilinktunisia2025SecretKeyForJWTTokenGenerationAndValidation}

# File Storage Configuration
file:
  upload-dir: ./uploads
  allowed-extensions: pdf,jpg,jpeg,png,doc,docx

# Eureka Client - Service Discovery
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    enabled: true  # Activé - Tous les services doivent s'inscrire sur Eureka
    register-with-eureka: true
    fetch-registry: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Feign Configuration
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# Logging
logging:
  level:
    com.medilinktunisia: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/patient-service.log

# Management Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: true
