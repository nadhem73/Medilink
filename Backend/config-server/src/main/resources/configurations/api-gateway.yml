# Configuration centralisée pour l'API Gateway
spring:
  application:
    name: api-gateway

server:
  port: 8080

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:c21hcnRoZWFsdGh0dW5pc2lhLXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLXZlcnktbG9uZy1hbmQtc2VjdXJl}
  expiration: 86400000

# Redis Configuration
spring.data.redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

# Logging
logging:
  level:
    root: INFO
    com.smarthealthtunisia: DEBUG
