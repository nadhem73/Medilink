spring:
  application:
    name: config-server
  profiles:
    active: ${SPRING_PROFILE:native}

  cloud:
    config:
      server:
        # Configuration Native (Fichiers locaux)
        native:
          search-locations: classpath:/configurations/,file:./configurations/
        
        # Configuration Git (Alternative - décommenter pour utiliser Git)
        # git:
        #   uri: ${CONFIG_GIT_URI:https://github.com/your-org/smart-health-configs}
        #   default-label: main
        #   search-paths: '{application}'
        #   clone-on-start: true
        #   username: ${CONFIG_GIT_USERNAME:}
        #   password: ${CONFIG_GIT_PASSWORD:}
        
        # Encryption/Decryption
        encrypt:
          enabled: false

  # Security Configuration
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:configadmin}
      password: ${CONFIG_SERVER_PASSWORD:configadmin123}

# Server Configuration
server:
  port: ${SERVER_PORT:8888}
  compression:
    enabled: true

# Eureka Configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh,bus-refresh
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    root: INFO
    com.smarthealthtunisia: DEBUG
    org.springframework.cloud.config: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  file:
    name: logs/config-server.log

# Info endpoint
info:
  app:
    name: Smart Health Tunisia Config Server
    description: Centralized Configuration Management
    version: 1.0.0
