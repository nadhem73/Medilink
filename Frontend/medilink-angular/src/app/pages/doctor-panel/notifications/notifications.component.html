<section class="dp-page">
  <header class="dp-header">
    <div>
      <p class="dp-kicker">Panel medecin</p>
      <h1>Notifications</h1>
      <p class="dp-copy">Rappels et alertes personnalises envoyes par email, SMS et notifications push.</p>
    </div>
    <a routerLink="/dashboard/doctor" class="dp-back">Retour au tableau de bord</a>
  </header>

  <article class="dp-card">
    <div class="dp-card-header">
      <h2>Toutes les notifications</h2>
      <span class="dp-badge orange">2 non lues</span>
    </div>
    <div class="dp-list">
      <div class="dp-item" *ngFor="let n of notifications">
        <div>
          <h3>{{ n.title }} <span class="dp-status" *ngIf="n.unread" style="margin-left:6px;">Nouveau</span></h3>
          <p>{{ n.detail }}</p>
          <p style="margin-top:4px; font-size:12px;">Canal : {{ n.channel }}</p>
        </div>
        <span style="font-size:12px; color:var(--gris-clinique, #5a6a7a); white-space:nowrap;">{{ n.time }}</span>
      </div>
    </div>
  </article>
</section>
