<div class="ai-reg">

  <!-- ===== Arrière-plan médical : molécules + ADN + bokeh + ECG ===== -->
  <div class="ai-bg" aria-hidden="true">

    <svg class="ai-defs" aria-hidden="true">
      <defs>
        <radialGradient id="atomGlossyL" cx="35%" cy="28%" r="75%">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="30%" stop-color="#8fd0ef"/>
          <stop offset="70%" stop-color="#1f86c4"/>
          <stop offset="100%" stop-color="#0a5a92"/>
        </radialGradient>
        <radialGradient id="atomSoftL" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
          <stop offset="60%" stop-color="#cfe7f6" stop-opacity="0.45"/>
          <stop offset="100%" stop-color="#bcd9ec" stop-opacity="0.10"/>
        </radialGradient>
      </defs>
    </svg>

    <i class="ai-bokeh" *ngFor="let b of bgBokeh"></i>

    <svg class="ai-dna" viewBox="0 0 1200 220" preserveAspectRatio="none">
      <line class="dna-rung" *ngFor="let r of dnaRungs"
            [attr.x1]="r.x" [attr.y1]="r.y1" [attr.x2]="r.x" [attr.y2]="r.y2"
            [attr.opacity]="r.op"></line>
      <polyline class="dna-strand a" [attr.points]="dnaStrandA"></polyline>
      <polyline class="dna-strand b" [attr.points]="dnaStrandB"></polyline>
    </svg>

    <svg class="ai-mol ai-mol--tr" viewBox="0 0 220 180">
      <g class="mol-spin">
        <line class="mol-bond" x1="162" y1="85" x2="136" y2="130"/>
        <line class="mol-bond" x1="136" y1="130" x2="84" y2="130"/>
        <line class="mol-bond" x1="84" y1="130" x2="58" y2="85"/>
        <line class="mol-bond" x1="58" y1="85" x2="84" y2="40"/>
        <line class="mol-bond" x1="84" y1="40" x2="136" y2="40"/>
        <line class="mol-bond" x1="136" y1="40" x2="162" y2="85"/>
        <line class="mol-bond" x1="162" y1="85" x2="198" y2="66"/>
        <line class="mol-bond" x1="136" y1="40" x2="150" y2="12"/>
        <line class="mol-bond" x1="84" y1="130" x2="66" y2="166"/>
        <line class="mol-bond" x1="58" y1="85" x2="24" y2="98"/>
        <circle class="mol-atom-soft" cx="186" cy="120" r="17" fill="url(#atomSoftL)"/>
        <circle class="mol-atom-soft" cx="40" cy="140" r="14" fill="url(#atomSoftL)"/>
        <circle class="mol-atom-soft" cx="120" cy="166" r="12" fill="url(#atomSoftL)"/>
        <circle cx="162" cy="85" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="136" cy="130" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="84" cy="130" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="58" cy="85" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="84" cy="40" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="136" cy="40" r="12" fill="url(#atomGlossyL)"/>
        <circle cx="198" cy="66" r="7" fill="url(#atomGlossyL)"/>
        <circle cx="150" cy="12" r="7" fill="url(#atomGlossyL)"/>
        <circle cx="66" cy="166" r="7" fill="url(#atomGlossyL)"/>
        <circle cx="24" cy="98" r="7" fill="url(#atomGlossyL)"/>
      </g>
    </svg>

    <svg class="ai-mol ai-mol--bl" viewBox="0 0 200 160">
      <g class="mol-spin">
        <line class="mol-bond" x1="110" y1="90" x2="92" y2="128"/>
        <line class="mol-bond" x1="92" y1="128" x2="50" y2="128"/>
        <line class="mol-bond" x1="50" y1="128" x2="30" y2="90"/>
        <line class="mol-bond" x1="30" y1="90" x2="50" y2="52"/>
        <line class="mol-bond" x1="50" y1="52" x2="92" y2="52"/>
        <line class="mol-bond" x1="92" y1="52" x2="110" y2="90"/>
        <line class="mol-bond" x1="110" y1="90" x2="150" y2="76"/>
        <line class="mol-bond" x1="50" y1="128" x2="34" y2="156"/>
        <circle class="mol-atom-soft" cx="150" cy="120" r="16" fill="url(#atomSoftL)"/>
        <circle class="mol-atom-soft" cx="20" cy="118" r="12" fill="url(#atomSoftL)"/>
        <circle cx="110" cy="90" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="92" cy="128" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="50" cy="128" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="30" cy="90" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="50" cy="52" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="92" cy="52" r="10" fill="url(#atomGlossyL)"/>
        <circle cx="150" cy="76" r="6" fill="url(#atomGlossyL)"/>
        <circle cx="34" cy="156" r="6" fill="url(#atomGlossyL)"/>
      </g>
    </svg>

    <svg class="ai-ecg ai-ecg--l" viewBox="0 0 240 44" preserveAspectRatio="none">
      <polyline points="0,22 60,22 72,22 80,6 92,40 104,22 150,22 162,14 172,30 182,22 240,22"/>
    </svg>
    <svg class="ai-ecg ai-ecg--r" viewBox="0 0 240 44" preserveAspectRatio="none">
      <polyline points="0,22 60,22 72,22 80,6 92,40 104,22 150,22 162,14 172,30 182,22 240,22"/>
    </svg>

    <span class="ai-cross">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round">
        <line x1="12" y1="6" x2="12" y2="18"/><line x1="6" y1="12" x2="18" y2="12"/>
      </svg>
    </span>
  </div>

  <!-- Retour accueil -->
  <a routerLink="/" class="ai-back">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline>
    </svg>
    <span>Accueil</span>
  </a>

  <div class="ai-stage">
    <section class="ai-console ai-console--auth" [attr.data-role]="selectedRole">

      <!-- Logo / marque -->
      <div class="auth-brand">
        <img src="/assets/images/partners/Ministère de la Santé - Tunisie.png" alt="MediLink Tunisia" class="brand-logo">
        <span class="brand-name">MediLink Tunisia</span>
      </div>

      <!-- En-tête -->
      <header class="auth-head">
        <h1>Connexion</h1>
        <p>Entrez vos identifiants pour accéder à votre espace santé.</p>
      </header>

      <!-- Sélecteur d'espace : Patient / Médecin / Pharmacie -->
      <div class="role-seg" role="tablist" aria-label="Choisir votre espace" [attr.data-role]="selectedRole">
        <span class="role-seg-thumb" [style.transform]="'translateX(' + (activeIndex * 100) + '%)'" aria-hidden="true"></span>

        <button type="button" class="role-seg-btn role-seg-btn--patient" role="tab"
                [class.active]="selectedRole === 'patient'"
                [attr.aria-selected]="selectedRole === 'patient'"
                (click)="selectRole('patient')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Patient</span>
        </button>

        <button type="button" class="role-seg-btn role-seg-btn--doctor" role="tab"
                [class.active]="selectedRole === 'doctor'"
                [attr.aria-selected]="selectedRole === 'doctor'"
                (click)="selectRole('doctor')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 2v3a2 2 0 0 0 2 2"/><path d="M6 2v3a2 2 0 0 1-2 2"/><path d="M8 15a6 6 0 0 0 12 0v-3"/><path d="M8 15v-3a6 6 0 0 1 6-6"/><circle cx="20" cy="10" r="2"/>
          </svg>
          <span>Médecin</span>
        </button>

        <button type="button" class="role-seg-btn role-seg-btn--pharmacy" role="tab"
                [class.active]="selectedRole === 'pharmacy'"
                [attr.aria-selected]="selectedRole === 'pharmacy'"
                (click)="selectRole('pharmacy')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="m19 8-4 4M3 21h12a1 1 0 0 0 1-1v-5a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v5a1 1 0 0 0 0 1Z"/><path d="M12 11V7a4 4 0 0 1 8 0"/><line x1="9.5" y1="15.5" x2="9.5" y2="18.5"/><line x1="8" y1="17" x2="11" y2="17"/>
          </svg>
          <span>Pharmacie</span>
        </button>
      </div>

      <!-- Formulaire -->
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">

        <div class="ai-input" [class.ok]="loginForm.get('identifier')?.valid">
          <label for="identifier">{{ activeRole.idLabel }}</label>
          <input [type]="activeRole.idType" id="identifier" formControlName="identifier" [placeholder]="activeRole.idPlaceholder" [attr.autocomplete]="activeRole.idAutocomplete">
          <p class="ai-err" *ngIf="loginForm.get('identifier')?.invalid && loginForm.get('identifier')?.touched">{{ activeRole.idLabel }} requis.</p>
        </div>

        <div class="ai-input pwd" [class.ok]="loginForm.get('password')?.valid">
          <label for="password">Mot de passe</label>
          <div class="pwd-wrap">
            <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" placeholder="••••••••" autocomplete="current-password">
            <button type="button" class="pwd-toggle" (click)="showPassword = !showPassword" aria-label="Afficher le mot de passe">
              <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <p class="ai-err" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">Mot de passe requis.</p>
        </div>

        <div class="auth-row">
          <a routerLink="/auth/forgot-password" class="auth-link">Mot de passe oublié ?</a>
        </div>

        <div class="ai-banner error" *ngIf="errorMessage">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          {{ errorMessage }}
        </div>

        <button type="submit" class="ai-btn primary auth-submit" [disabled]="loginForm.invalid || loading">
          <span *ngIf="!loading">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
            Connexion
          </span>
          <span *ngIf="loading" class="spin">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
            Connexion…
          </span>
        </button>
      </form>

      <p class="ai-foot">Vous n'avez pas de compte ? <a routerLink="/auth/register">Créer un compte</a></p>
    </section>
  </div>
</div>
