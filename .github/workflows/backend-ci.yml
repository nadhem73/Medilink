name: Backend CI - Microservices

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-service
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - pharmacy-service
          - prescription-service

    defaults:
      run:
        working-directory: Backend/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Backend/${{ matrix.service }}/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and test (${{ matrix.service }})
        run: mvn clean verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JAR artifact (${{ matrix.service }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: Backend/${{ matrix.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: warn
