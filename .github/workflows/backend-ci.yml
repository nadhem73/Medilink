name: Backend CI - Microservices

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-service
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - pharmacy-service
          - prescription-service

    defaults:
      run:
        working-directory: Backend/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles(format('Backend/{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build, test, and generate coverage (${{ matrix.service }})
        run: mvn clean verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload coverage report (${{ matrix.service }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/target/site/jacoco/
          retention-days: 7
          if-no-files-found: warn

      - name: Upload JAR artifact (${{ matrix.service }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: Backend/${{ matrix.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: warn

  sonarcloud:
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage-reports
          merge-multiple: true

      - name: SonarQube Analysis
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectBaseDir=.
            -Dsonar.sources=Backend,Frontend/medilink-angular/src
            -Dsonar.coverage.jacoco.xmlReportPaths=coverage-reports/jacoco.xml
