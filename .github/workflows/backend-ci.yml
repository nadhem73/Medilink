name: Backend CI - Microservices

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main" ]
    paths:
      - 'Backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - config-server
          - eureka-service
          - api-gateway
          - auth-service
          - patient-service
          - doctor-service
          - pharmacy-service
          - prescription-service

    defaults:
      run:
        working-directory: Backend/${{ matrix.service }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles(format('Backend/{0}/pom.xml', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build, test, and generate coverage (${{ matrix.service }})
        run: mvn clean verify --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload JAR artifact (${{ matrix.service }})
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.service }}-jar
          path: Backend/${{ matrix.service }}/target/*.jar
          retention-days: 7
          if-no-files-found: warn

      - name: Upload coverage (${{ matrix.service }})
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}
          path: Backend/${{ matrix.service }}/target/site/jacoco/jacoco.xml
          retention-days: 7
          if-no-files-found: warn

  sonarcloud-analysis:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all backend coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: Backend
          merge-multiple: false

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: Frontend/medilink-angular/coverage
        continue-on-error: true

      - name: Restore coverage files to correct paths
        shell: bash
        run: |
          for dir in Backend/coverage-*/; do
            service_name=$(basename "$dir" | sed 's/^coverage-//')
            mkdir -p "Backend/$service_name/target/site/jacoco"
            if [ -f "${dir}jacoco.xml" ]; then
              cp "${dir}jacoco.xml" "Backend/$service_name/target/site/jacoco/jacoco.xml"
              echo "Restored coverage for $service_name"
            fi
          done

      - name: SonarQube Analysis
        if: ${{ secrets.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectBaseDir=.
